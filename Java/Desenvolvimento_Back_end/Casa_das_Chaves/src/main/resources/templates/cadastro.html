<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Casa das Chaves</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2>Cadastro de Usuário</h2>

        <form th:action="@{/cadastro}" th:object="${requestDto}" method="post">

            <div class="input-group">
                <label for="nome">Nome completo</label>
                <input type="text" th:field="*{nome}" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" th:field="*{email}" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" th:field="*{senha}" id="senha" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="input-group">
                <label for="confirmSenha">Confirmar senha</label>
                <input type="password" id="confirmSenha" placeholder="Digite a senha novamente" required>
            </div>

            <button type="submit" class="btn-register">
                Cadastrar
            </button>

            <div class="form-footer">
                <p>Já tem uma conta?
                    <a th:href="@{/login}">Fazer login</a>
                </p>
            </div>

        </form>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
